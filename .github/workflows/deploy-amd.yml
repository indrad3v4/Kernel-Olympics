name: CI/CD — Test + Deploy to AMD Cloud

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: 🧪 Run tests (all branches)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      - name: Run test suite
        run: |
          python3 -m pytest tests/ -v --tb=short

  deploy:
    name: 🚀 Deploy to AMD Cloud GPU
    needs: test
    if: github.ref == 'refs/heads/main' && vars.AMD_CLOUD_ENABLED == 'true'
    runs-on: ubuntu-latest
    environment: amd-cloud
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AMD_CLOUD_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.AMD_CLOUD_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Copy code to AMD Cloud
        run: |
          rsync -avz --delete --exclude='.git' --exclude='.venv' --exclude='__pycache__' \
            ./ ${{ secrets.AMD_CLOUD_USER }}@${{ secrets.AMD_CLOUD_HOST }}:${{ secrets.AMD_CLOUD_WORK_DIR }}/

      - name: Install dependencies on AMD Cloud
        run: |
          ssh ${{ secrets.AMD_CLOUD_USER }}@${{ secrets.AMD_CLOUD_HOST }} \
            "cd ${{ secrets.AMD_CLOUD_WORK_DIR }} && \
             python3 -m pip install -r requirements.txt 2>&1 | tail -3"

      - name: Run full pipeline on AMD GPU (warp_reduce)
        run: |
          ssh ${{ secrets.AMD_CLOUD_USER }}@${{ secrets.AMD_CLOUD_HOST }} \
            "cd ${{ secrets.AMD_CLOUD_WORK_DIR }} && \
             python3 -m src.main \
               --input sample_kernels/cuda/warp_reduce.cu \
               --output portability_report.json 2>&1"

      - name: Run second kernel (pattern memory speedup demo)
        run: |
          ssh ${{ secrets.AMD_CLOUD_USER }}@${{ secrets.AMD_CLOUD_HOST }} \
            "cd ${{ secrets.AMD_CLOUD_WORK_DIR }} && \
             python3 -m src.main \
               --input sample_kernels/cuda/histogram.cu \
               --output portability_report.json 2>&1"

      - name: Fetch reports
        run: |
          scp ${{ secrets.AMD_CLOUD_USER }}@${{ secrets.AMD_CLOUD_HOST }}:${{ secrets.AMD_CLOUD_WORK_DIR }}/portability_report.json ./latest_report.json 2>/dev/null || true

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: portability-report
          path: latest_report.json

  demo-on-github:
    name: 🎯 Demo run (no GPU needed)
    needs: test
    if: success() && vars.AMD_CLOUD_ENABLED != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      - name: Run Kernel Olympics demo (template mode)
        run: |
          echo "━━━ AMD Cloud not configured — running demo in template mode ━━━"
          python3 src/main.py --demo 2>&1 || echo "Demo completed (template fallback)"
