name: CI/CD — Test + Demo + Docker Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: 🧪 Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python3 -m pytest tests/ -v
        env:
          PYTHONPATH: src

  demo:
    name: 🎯 Demo run (no GPU needed)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python3 src/main.py --input sample_kernels/cuda/warp_reduce.cu --output demo_report.json
        env:
          PYTHONPATH: src
      - uses: actions/upload-artifact@v4
        with:
          name: demo-report
          path: demo_report.json

  docker-build:
    name: 🐳 Build Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t kernel-olympics:latest .
      - name: Test Docker container (template mode)
        run: docker run --rm -e PYTHONPATH=/app/src kernel-olympics:latest --input sample_kernels/cuda/warp_reduce.cu
      - name: Test Docker demo mode
        run: docker run --rm -e PYTHONPATH=/app/src kernel-olympics:latest --demo
